<div class="card border-t-4 border-emerald-600">
    <div class="flex justify-between items-center mb-4">
        <h3 class="text-xs font-bold uppercase text-emerald-500">⏰ Horaires : Clichy-sous-Bois</h3>
        <span class="text-[8px] bg-emerald-900/30 px-2 py-1 rounded text-emerald-400 font-bold uppercase">18° (Mosquée de Paris)</span>
    </div>
    <div class="grid grid-cols-5 gap-2 text-center" id="prayer-times">
        </div>
    <p class="text-[7px] text-center text-slate-500 mt-2 uppercase italic">Basé sur la Grande Mosquée de Clichy (Bilal)</p>
</div>

<script>
// Remplace ta fonction getPrayers par celle-ci pour Clichy-sous-Bois
async function getPrayers() {
    try {
        // Utilisation de la méthode 3 (Grande Mosquée de Paris / 18°) pour Clichy
        const r = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Clichy-sous-Bois&country=France&method=3`);
        const d = await r.json();
        const t = d.data.timings;
        
        document.getElementById('prayer-times').innerHTML = `
            <div class="bg-slate-900 p-2 rounded-lg border border-white/5"><p class="text-[7px] text-slate-500 uppercase">Fajr</p><p class="text-[10px] font-bold text-emerald-400">${t.Fajr}</p></div>
            <div class="bg-slate-900 p-2 rounded-lg border border-white/5"><p class="text-[7px] text-slate-500 uppercase">Dohr</p><p class="text-[10px] font-bold">${t.Dhuhr}</p></div>
            <div class="bg-slate-900 p-2 rounded-lg border border-white/5"><p class="text-[7px] text-slate-500 uppercase">Asr</p><p class="text-[10px] font-bold">${t.Asr}</p></div>
            <div class="bg-slate-900 p-2 rounded-lg border border-white/5"><p class="text-[7px] text-slate-500 uppercase">Maghr.</p><p class="text-[10px] font-bold">${t.Maghrib}</p></div>
            <div class="bg-slate-900 p-2 rounded-lg border border-white/5"><p class="text-[7px] text-slate-500 uppercase">Icha</p><p class="text-[10px] font-bold">${t.Isha}</p></div>
        `;
        
        // Mise à jour date Hijri
        if(document.getElementById('hijri-date')) {
            document.getElementById('hijri-date').textContent = d.data.date.hijri.day + " " + d.data.date.hijri.month.fr + " " + d.data.date.hijri.year;
        }
    } catch (e) {
        document.getElementById('prayer-times').innerHTML = "<p class='col-span-5 text-[10px] text-red-500'>Erreur de connexion aux horaires</p>";
    }
}

// Lancer au chargement
getPrayers();
</script>
