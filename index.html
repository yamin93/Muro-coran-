<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Coran en Français</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
    </style>
</head>
<body class="p-5">

    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-center mb-8 text-emerald-400">Le Saint Coran</h1>
        
        <select id="surahSelect" class="w-full p-3 bg-slate-800 border border-slate-700 rounded-lg mb-6 outline-none focus:border-emerald-500">
            <option value="">Chargement des sourates...</option>
        </select>

        <div id="coranContent" class="bg-slate-800 p-6 rounded-xl shadow-xl min-h-[300px]">
            <p class="text-slate-400 text-center">Sélectionnez une sourate pour commencer la lecture.</p>
        </div>
    </div>

    <script>
        const surahSelect = document.getElementById('surahSelect');
        const coranContent = document.getElementById('coranContent');

        // 1. Récupérer la liste des 114 sourates au chargement
        async function loadSurahList() {
            try {
                const response = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await response.json();
                surahSelect.innerHTML = '<option value="">-- Choisissez une sourate --</option>';
                data.data.forEach(surah => {
                    const option = document.createElement('option');
                    option.value = surah.number;
                    option.textContent = `${surah.number}. ${surah.englishName} (${surah.name})`;
                    surahSelect.appendChild(option);
                });
            } catch (error) {
                coranContent.innerHTML = "Erreur lors du chargement de la liste.";
            }
        }

        // 2. Afficher le texte en français quand on choisit une sourate
        surahSelect.addEventListener('change', async (e) => {
            const surahNumber = e.target.value;
            if (!surahNumber) return;

            coranContent.innerHTML = "<p class='text-center'>Chargement des versets...</p>";

            try {
                // On récupère la traduction française (edition fr.hamidullah)
                const response = await fetch(`https://api.alquran.cloud/v1/surah/${surahNumber}/fr.hamidullah`);
                const data = await response.json();
                
                let html = `<h2 class="text-2xl font-bold text-emerald-400 mb-4">${data.data.englishName}</h2>`;
                data.data.ayahs.forEach(ayah => {
                    html += `
                        <div class="mb-4 pb-4 border-b border-slate-700">
                            <span class="text-emerald-500 font-bold text-sm">Verset ${ayah.numberInSurah}</span>
                            <p class="text-lg leading-relaxed mt-2">${ayah.text}</p>
                        </div>
                    `;
                });
                coranContent.innerHTML = html;
            } catch (error) {
                coranContent.innerHTML = "Impossible de charger cette sourate.";
            }
        });

        loadSurahList();
    </script>
</body>
</html>
