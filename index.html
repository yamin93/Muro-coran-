<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coran Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .arabic { font-family: 'Amiri', serif; direction: rtl; }
    </style>
</head>
<body class="p-4 sm:p-8">

    <div class="max-w-3xl mx-auto">
        <h1 class="text-4xl font-bold text-center mb-10 text-emerald-400">Le Saint Coran</h1>
        
        <select id="surahSelect" class="w-full p-4 bg-slate-800 border-2 border-emerald-900 rounded-2xl mb-8 outline-none focus:border-emerald-500 transition-all text-lg">
            <option value="">Chargement des sourates...</option>
        </select>

        <div id="coranContent" class="space-y-6">
            </div>
    </div>

    <script>
        const surahSelect = document.getElementById('surahSelect');
        const coranContent = document.getElementById('coranContent');

        async function loadSurahList() {
            try {
                const response = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await response.json();
                surahSelect.innerHTML = '<option value="">-- Choisissez une sourate --</option>';
                data.data.forEach(surah => {
                    const option = document.createElement('option');
                    option.value = surah.number;
                    option.textContent = `${surah.number}. ${surah.englishName} (${surah.name})`;
                    surahSelect.appendChild(option);
                });
            } catch (e) { coranContent.innerHTML = "Erreur de connexion."; }
        }

        surahSelect.addEventListener('change', async (e) => {
            const num = e.target.value;
            if (!num) return;

            coranContent.innerHTML = "<p class='text-center animate-pulse'>Ouverture de la sourate...</p>";

            try {
                // On charge la traduction française
                const resFr = await fetch(`https://api.alquran.cloud/v1/surah/${num}/fr.hamidullah`);
                const dataFr = await resFr.json();
                
                let html = `
                    <div class="text-center mb-10">
                        <h2 class="text-3xl font-extrabold text-emerald-400 mb-6">${dataFr.data.englishName}</h2>
                        <div class="arabic text-5xl mb-4 text-white py-6 border-y border-slate-700">
                            بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ
                        </div>
                        <p class="text-slate-400 italic text-lg">"Au nom d'Allah, le Tout Miséricordieux, le Très Miséricordieux"</p>
                    </div>
                `;

                dataFr.data.ayahs.forEach((ayah) => {
                    // On retire la bismillah du texte si elle est déjà au début pour ne pas l'avoir en double
                    let text = ayah.text;
                    if (num != 1 && ayah.numberInSurah == 1) {
                        text = text.replace("Au nom d'Allah, le Tout Miséricordieux, le Très Miséricordieux", "");
                    }

                    html += `
                        <div class="bg-slate-800/50 p-6 rounded-2xl border border-slate-700 hover:border-emerald-500/50 transition-colors">
                            <span class="inline-block bg-emerald-600 text-white text-xs font-bold px-2 py-1 rounded-md mb-3">Verset ${ayah.numberInSurah}</span>
                            <p class="text-xl leading-relaxed text-slate-200">${text}</p>
                        </div>
                    `;
                });
                coranContent.innerHTML = html;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } catch (e) { coranContent.innerHTML = "Erreur de chargement."; }
        });

        loadSurahList();
    </script>
</body>
</html>
