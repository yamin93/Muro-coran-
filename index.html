<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muslim App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #010606; color: #e6edf3; padding-bottom: 120px; }
        .hidden { display: none; }
        .nav-active { background: #059669 !important; color: white !important; border-radius: 10px; }
        .card { background: #0a1212; border-radius: 24px; padding: 20px; border: 1px solid #1e293b; margin-bottom: 15px; }
        .arabic { font-family: 'Amiri', serif; direction: rtl; line-height: 2.2; }
        .bismillah { font-size: 2.2rem; color: #10b981; text-align: center; margin: 20px 0; }
        .phonetic { color: #3b82f6; font-size: 0.8rem; font-weight: 600; margin-top: 8px; }
        nav button { font-size: 7px !important; font-weight: 900; text-transform: uppercase; }
        .btn-audio { font-size: 9px; font-weight: 900; text-transform: uppercase; padding: 12px 5px; border-radius: 12px; flex: 1; transition: all 0.2s; }
    </style>
</head>
<body class="p-4" onload="initApp()">

    <div class="max-w-md mx-auto">
        <div class="text-center py-6">
            <h1 class="text-5xl font-black text-emerald-500 italic uppercase tracking-tighter">Muslim App</h1>
            <p id="hijri-date" class="text-[10px] text-emerald-800 font-bold mt-2 uppercase tracking-widest italic text-center">Chargement...</p>
        </div>

        <nav class="grid grid-cols-6 gap-1 mb-6 bg-[#111827] p-1 rounded-2xl sticky top-2 z-50 shadow-xl border border-white/5">
            <button id="b-home" onclick="nav('home')" class="py-3">Home</button>
            <button id="b-piliers" onclick="nav('piliers')" class="py-3">Piliers</button>
            <button id="b-coran" onclick="nav('coran')" class="py-3">Coran</button>
            <button id="b-guide" onclick="nav('guide')" class="py-3">Guide</button>
            <button id="b-quiz" onclick="nav('quiz')" class="py-3">Quiz</button>
            <button id="b-don" onclick="nav('don')" class="py-3 text-amber-500">Aider</button>
        </nav>

        <div id="s-coran" class="hidden space-y-4">
            <select id="selSurah" class="w-full p-5 bg-[#0a1212] border-2 border-emerald-900 rounded-2xl text-emerald-400 font-black text-sm" onchange="loadSurahContent()"></select>
            
            <div class="flex gap-2">
                <button onclick="playAuto()" class="btn-audio bg-emerald-600 text-white">Lancer l'audio</button>
                <button onclick="pauseAudio()" class="btn-audio bg-amber-600 text-white">Mettre en pause</button>
                <button onclick="stopAudio()" class="btn-audio bg-red-600 text-white">Éteindre l'audio</button>
            </div>

            <div id="contentCoran" class="space-y-4"></div>
        </div>

        <div id="s-home" class="space-y-4">
            <div class="card border-t-4 border-emerald-600">
                <div id="prayer-times" class="grid grid-cols-5 gap-2 text-center text-[8px] font-black text-emerald-400 italic"></div>
            </div>
            <div id="doua-box" class="card text-center bg-emerald-900/5">
                <p id="doua-ar" class="arabic text-3xl text-white mb-2"></p>
                <p id="doua-fr" class="text-[12px] text-slate-400 italic font-bold"></p>
                <button onclick="generateDoua()" class="mt-4 text-emerald-500 text-[10px] font-bold underline uppercase">Suivant</button>
            </div>
        </div>

        <div id="s-guide" class="hidden space-y-6">
            <div class="card border-l-8 border-red-600">
                <h2 class="text-3xl font-black text-red-500 uppercase italic mb-4">Fin du Monde</h2>
                <p class="text-sm text-slate-200 font-bold">Signes mineurs et majeurs (Dajjal, Issa SWS, Soleil à l'Ouest).</p>
            </div>
            <div class="card border-l-8 border-amber-500">
                <h2 class="text-3xl font-black text-amber-500 uppercase italic mb-4">Ablutions</h2>
                <p class="text-lg text-slate-300 font-bold leading-loose">Mains, Bouche, Nez, Visage, Bras, Tête, Pieds.</p>
            </div>
        </div>

        <div id="s-piliers" class="hidden space-y-3">
             <div class="card border-l-4 border-emerald-500 font-black uppercase text-sm">Les 5 Piliers de l'Islam</div>
        </div>

        <div id="s-quiz" class="hidden">
            <div id="quiz-menu" class="space-y-4 text-center">
                <button onclick="initQuiz('coran')" class="w-full card border-blue-500 font-black uppercase py-6 italic">📖 Quiz Coran</button>
            </div>
            <div id="quiz-game" class="hidden text-center">
                <p id="quiz-q" class="text-xl font-black text-white mb-10 italic"></p>
                <div id="quiz-opts" class="grid gap-4"></div>
            </div>
        </div>

        <div id="s-don" class="hidden space-y-6">
            <div class="text-center px-4">
                <h2 class="text-3xl font-black text-amber-500 uppercase italic mb-2 text-center">Soutenir</h2>
                <p class="text-sm text-slate-400 italic font-bold text-center">Aidez-nous à améliorer l'application.</p>
                <a href="https://www.paypal.me/YaminDjaouat881/5.00" target="_blank" class="block mt-6 bg-[#111827] border border-blue-500 p-5 rounded-2xl font-black">Soutenir le projet - 5,00 €</a>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-white text-black py-5 text-center font-black text-[10px] border-t-4 border-emerald-600 z-50">
        BOUTIQUE : <span class="text-blue-700 uppercase underline">Coran Noble Édition</span>
    </div>

    <script>
        let currentAudio = null;
        let audioList = [];
        let currentVerseIdx = 0;
        let isPlaying = false;

        function nav(id) {
            ['home','piliers','coran','guide','quiz','don'].forEach(s => {
                document.getElementById('s-'+s).classList.add('hidden');
                document.getElementById('b-'+s).classList.remove('nav-active');
            });
            document.getElementById('s-'+id).classList.remove('hidden');
            document.getElementById('b-'+id).classList.add('nav-active');
            stopAudio();
        }

        async function loadSurahContent() {
            const num = document.getElementById('selSurah').value;
            if(!num) return;
            stopAudio();
            
            const rAr = await fetch(`https://api.alquran.cloud/v1/surah/${num}/ar.alafasy`);
            const dAr = await rAr.json();
            const rPh = await fetch(`https://api.alquran.cloud/v1/surah/${num}/en.transliteration`);
            const dPh = await rPh.json();

            audioList = dAr.data.ayahs.map(a => a.audio);
            currentVerseIdx = 0;

            let h = '';
            if (num != 9) h += `<div class="bismillah arabic">بِسْمِ اللهِ الرَّحْمٰنِ الرَّحِيْمِ</div>`;

            dAr.data.ayahs.forEach((a, i) => {
                let text = a.text;
                if (i === 0 && num != 1 && num != 9) text = text.replace("بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ", "");
                h += `<div id="v-${i}" class="p-6 bg-[#0a1212] rounded-3xl border border-white/5 mb-4 shadow-md transition-all" onclick="playSingle(${i})">
                    <div class="arabic text-3xl text-emerald-400 mb-2">${text}</div>
                    <div class="phonetic italic">${dPh.data.ayahs[i].text}</div>
                </div>`;
            });
            document.getElementById('contentCoran').innerHTML = h;
        }

        function playSingle(idx) {
            stopAudio();
            currentVerseIdx = idx;
            playVerse();
        }

        function playAuto() {
            if (isPlaying) return;
            isPlaying = true;
            playVerse();
        }

        function playVerse() {
            if (currentVerseIdx >= audioList.length) { isPlaying = false; return; }
            
            // Highlight du verset
            document.querySelectorAll('[id^="v-"]').forEach(el => el.style.borderColor = "rgba(255,255,255,0.05)");
            const currentEl = document.getElementById(`v-${currentVerseIdx}`);
            if(currentEl) {
                currentEl.style.borderColor = "#10b981";
                currentEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }

            currentAudio = new Audio(audioList[currentVerseIdx]);
            currentAudio.play();
            currentAudio.onended = () => {
                if (isPlaying) {
                    currentVerseIdx++;
                    playVerse();
                }
            };
        }

        function pauseAudio() {
            isPlaying = false;
            if(currentAudio) currentAudio.pause();
        }

        function stopAudio() {
            isPlaying = false;
            if(currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            currentVerseIdx = 0;
            document.querySelectorAll('[id^="v-"]').forEach(el => el.style.borderColor = "rgba(255,255,255,0.05)");
        }

        const douas = [{ar: "رَبِّ زِدْنِي عِلْمًا", fr: "Seigneur, augmente ma science."}];
        function generateDoua() {
            const d = douas[Math.floor(Math.random() * douas.length)];
            document.getElementById('doua-ar').innerText = d.ar;
            document.getElementById('doua-fr').innerText = d.fr;
        }

        async function initApp() {
            try {
                const r = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Paris&country=France&method=3');
                const d = await r.json();
                const t = d.data.timings;
                document.getElementById('prayer-times').innerHTML = `<div>FAJR<br>${t.Fajr}</div><div>DHUR<br>${t.Dhuhr}</div><div>ASR<br>${t.Asr}</div><div>MAGH<br>${t.Maghrib}</div><div>ICHA<br>${t.Isha}</div>`;
                if(d.data.date.hijri) document.getElementById('hijri-date').innerText = `${d.data.date.hijri.day} ${d.data.date.hijri.month.fr || d.data.date.hijri.month.en} ${d.data.date.hijri.year}`;
            } catch(e) {}
            const rS = await fetch('https://api.alquran.cloud/v1/surah');
            const dS = await rS.json();
            const sel = document.getElementById('selSurah');
            sel.innerHTML = '<option value="">Ouvrir une Sourate</option>';
            dS.data.forEach(s => sel.innerHTML += `<option value="${s.number}">${s.number}. ${s.englishName}</option>`);
            generateDoua(); nav('home');
        }
    </script>
</body>
</html>
