    <style>
        :root {

            --primary-light: #14b8a6;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-gold: #fbbf24;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: #e2e8f0;
            min-height: 100vh;
        }
        
        .arabic-font {
            font-family: 'Amiri', serif;
            line-height: 2.2;
        }
        
        .sourate-card {
            background: var(--bg-card);
            border: 1px solid #334155;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .sourate-card:hover {
            border-color: var(--primary-light);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(20, 184, 166, 0.1);
        }
        
        .sourate-card.active {
            border-color: var(--text-gold);
            background: #1e293b;
        }
        
        .verse-container {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid #334155;
        }
        
        .verse-number {
            background: var(--primary);
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
        }
        
        .arabic-text {
            font-size: 1.5rem;
            color: #fbbf24;
            text-align: right;
            direction: rtl;
        }
        
        .french-text {
            font-size: 0.95rem;
            color: #94a3b8;
            font-style: italic;
            line-height: 1.6;
        }
        
        .bismillah {
            font-size: 2rem;
            color: var(--text-gold);
            text-align: center;
            margin: 1.5rem 0;
            direction: rtl;
        }
        
        .search-input {
            background: #1e293b;

            transition: all 0.3s;

        .search-input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(20, 184, 166, 0.2);
        }
        
        .sidebar {
            background: var(--bg-card);
            border-right: 1px solid #334155;
        }
        
        .scroll-smooth { scroll-behavior: smooth; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @media (max-width: 1024px) {
            .sidebar { 
                position: fixed; 
                left: -100%; 
                top: 0; 
                height: 100vh; 
                width: 300px; 
                z-index: 50; 
                transition: left 0.3s ease;
            }
            .sidebar.open { left: 0; }
            .overlay { 
                display: none; 
                position: fixed; 
                inset: 0; 
                background: rgba(0,0,0,0.7); 
                z-index: 40; 
            }
            .overlay.show { display: block; }
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
            transition: all 0.3s;
        }
        .btn-primary:hover { background: var(--primary-light); }
        
        .progress-bar {
            height: 3px;
            background: var(--primary);
            transition: width 0.3s;
        }
        
        .bookmark-btn {
            transition: all 0.2s;
        }
        .bookmark-btn:hover { color: var(--text-gold); }
        .bookmark-btn.active { color: var(--text-gold); }
    </style>
</head>
