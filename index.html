<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MUSLIM APP - Pack VIP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
        }

        /* Logo */
        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            font-size: 42px;
            font-weight: 900;
            font-style: italic;
            color: #4ade80;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .date {
            font-size: 14px;
            color: #4ade80;
            opacity: 0.8;
            margin-top: 8px;
            letter-spacing: 2px;
        }

        /* Navigation */
        .nav-container {
            background: #1a1a2e;
            border-radius: 30px;
            padding: 6px;
            display: flex;
            gap: 4px;
            margin-bottom: 40px;
            width: 90%;
            max-width: 400px;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 12px 8px;
            border-radius: 25px;
            font-size: 12px;
            font-weight: 600;
            color: #a0a0a0;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .nav-item.active {
            background: #0f0f1e;
            color: #ffffff;
        }

        /* Card VIP */
        .vip-card {
            background: #0f0f1e;
            border: 1px solid #1a1a2e;
            border-radius: 25px;
            padding: 40px 30px;
            width: 90%;
            max-width: 380px;
            text-align: center;
        }

        .pack-title {
            font-size: 32px;
            font-weight: 900;
            font-style: italic;
            color: #f59e0b;
            margin-bottom: 40px;
            text-transform: uppercase;
        }

        .price {
            font-size: 48px;
            font-weight: 800;
            color: #ffffff;
            margin-bottom: 30px;
        }

        /* PayPal Button Container */
        .paypal-wrapper {
            margin-bottom: 20px;
        }

        /* Fallback button style if PayPal doesn't load */
        .btn-paypal-fallback {
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 16px;
            width: 100%;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.2s;
        }

        .btn-paypal-fallback:hover {
            transform: scale(1.02);
        }

        /* Activate button */
        .btn-activate {
            background: #f59e0b;
            color: #000000;
            border: none;
            border-radius: 30px;
            padding: 18px;
            width: 100%;
            font-size: 14px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .btn-activate:hover {
            transform: scale(1.02);
        }

        /* Footer */
        .footer {
            margin-top: auto;
            padding: 30px 20px;
            text-align: center;
            width: 100%;
            background: #ffffff;
            color: #000000;
        }

        .footer-text {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .footer-link {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 700;
        }

        /* PayPal SDK overrides for dark theme */
        #paypal-button-container {
            min-height: 45px;
        }
    </style>
</head>
<body>

    <!-- Logo -->
    <div class="logo-container">
        <div class="logo">MUSLIM APP</div>
        <div class="date">9 RAMADAN 1447</div>
    </div>

    <!-- Navigation -->
    <div class="nav-container">
        <div class="nav-item">ACCUEIL</div>
        <div class="nav-item active">PILIERS</div>
        <div class="nav-item">CORAN</div>
        <div class="nav-item">OUTILS</div>
    </div>

    <!-- VIP Card -->
    <div class="vip-card">
        <div class="pack-title">PACK VIP</div>
        
        <div class="price">2,99€</div>
        
        <!-- PayPal Button -->
        <div class="paypal-wrapper">
            <div id="paypal-button-container"></div>
        </div>
        
        <button class="btn-activate" onclick="activateAccess()">
            ACTIVER MON ACCÈS
        </button>
    </div>

    <!-- Footer -->
    <div class="footer">
        <div class="footer-text">
            BOUTIQUE : <a href="#" class="footer-link">CORAN NOBLE ÉDITION</a>
        </div>
    </div>

    <!-- PayPal SDK -->
    <script src="https://www.paypal.com/sdk/js?client-id=YOUR_PAYPAL_CLIENT_ID&currency=EUR&locale=fr_FR"></script>
    
    <script>
        // Configuration PayPal
        if (typeof paypal !== 'undefined') {
            paypal.Buttons({
                style: {
                    color: 'blue',
                    shape: 'pill',
                    label: 'pay',
                    height: 45,
                    layout: 'horizontal'
                },
                
                createOrder: function(data, actions) {
                    return actions.order.create({
                        purchase_units: [{
                            amount: {
                                value: '2.99',
                                currency_code: 'EUR'
                            },
                            description: 'Pack VIP - Muslim App'
                        }]
                    });
                },
                
                onApprove: function(data, actions) {
                    return actions.order.capture().then(function(details) {
                        alert('✅ Paiement réussi ! Bienvenue dans le Pack VIP, ' + details.payer.name.given_name);
                        // Redirection après paiement
                        // window.location.href = '/vip-success';
                    });
                },
                
                onError: function(err) {
                    console.error('Erreur PayPal:', err);
                    alert('❌ Erreur de paiement. Veuillez réessayer.');
                },
                
                onCancel: function(data) {
                    console.log('Paiement annulé');
                }
                
            }).render('#paypal-button-container');
        } else {
            // Fallback si PayPal ne charge pas
            document.getElementById('paypal-button-container').innerHTML = 
                '<button class="btn-paypal-fallback" onclick="window.open(\'https://www.paypal.com/paypalme/VOTRE_LIEN_PAYPAL/2.99EUR\', \'_blank\')">' +
                '💰 PAYER VIA PAYPAL' +
                '</button>';
        }

        function activateAccess() {
            alert('Veuillez d\'abord effectuer le paiement PayPal pour activer votre accès VIP.');
        }
    </script>

</body>
</html>
