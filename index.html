<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apprendre l'Islam</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .arabic { font-family: 'Amiri', serif; direction: rtl; }
        .hidden { display: none; }
        .tab-active { background-color: #059669 !important; border-color: #10b981 !important; }
    </style>
</head>
<body class="p-4 sm:p-8 text-sm sm:text-base">

    <div class="max-w-3xl mx-auto">
        <div class="grid grid-cols-3 gap-2 mb-8 bg-slate-800 p-2 rounded-2xl border border-slate-700 shadow-lg">
            <button id="btn-lecture" onclick="showSection('lecture')" class="py-3 rounded-xl font-bold transition-all tab-active">📖 Coran</button>
            <button id="btn-quiz" onclick="showSection('quiz')" class="py-3 rounded-xl font-bold transition-all bg-slate-700">🧠 Quiz</button>
            <button id="btn-video" onclick="showSection('video')" class="py-3 rounded-xl font-bold transition-all bg-slate-700">🎥 Vidéos</button>
        </div>

        <div id="section-lecture">
            <h1 class="text-2xl font-bold text-center mb-6 text-emerald-400">Le Saint Coran (Français)</h1>
            <select id="surahSelect" class="w-full p-4 bg-slate-800 border-2 border-emerald-900 rounded-2xl mb-8 outline-none text-lg focus:border-emerald-500">
                <option value="">Chargement...</option>
            </select>
            <div id="coranContent" class="space-y-4"></div>
        </div>

        <div id="section-quiz" class="hidden">
            <div id="quiz-container" class="bg-slate-800 p-6 rounded-3xl border border-slate-700 shadow-2xl">
                <div id="question-box">
                    <span id="progress-text" class="text-emerald-400 font-bold block mb-2">Question 1/5</span>
                    <p id="question-text" class="text-xl mb-6 font-semibold"></p>
                    <div id="options-container" class="grid gap-3"></div>
                </div>
                <div id="result-box" class="hidden">
                    <h2 class="text-2xl font-bold text-center mb-2">Score Final</h2>
                    <p id="final-score" class="text-5xl text-emerald-400 font-bold text-center mb-6"></p>
                    <div id="correction-list" class="space-y-4 mb-6 max-h-96 overflow-y-auto p-2"></div>
                    <button onclick="startNewQuiz()" class="w-full bg-emerald-600 hover:bg-emerald-500 py-4 rounded-2xl font-bold text-lg transition-all">Nouveau Quiz Aléatoire</button>
                </div>
            </div>
        </div>

        <div id="section-video" class="hidden space-y-8">
            <div class="bg-slate-800 p-4 rounded-3xl border border-slate-700">
                <h3 class="text-emerald-400 font-bold mb-4 flex items-center">🚿 Apprendre les Ablutions</h3>
                <div class="aspect-video rounded-xl overflow-hidden shadow-2xl">
                    <iframe class="w-full h-full" src="https://www.youtube.com/embed/283X76v_7-A" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>
            
            <div class="bg-slate-800 p-4 rounded-3xl border border-slate-700">
                <h3 class="text-emerald-400 font-bold mb-4 flex items-center">📖 Apprendre à lire le Coran</h3>
                <div class="aspect-video rounded-xl overflow-hidden shadow-2xl">
                    <iframe class="w-full h-full" src="https://www.youtube.com/embed/T03K8lZ1n0o" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>
        </div>
    </div>

    <script>
        // NAVIGATION
        function showSection(s) {
            ['lecture', 'quiz', 'video'].forEach(id => {
                document.getElementById('section-'+id).classList.add('hidden');
                document.getElementById('btn-'+id).classList.replace('tab-active', 'bg-slate-700');
            });
            document.getElementById('section-'+s).classList.remove('hidden');
            document.getElementById('btn-'+s).classList.replace('bg-slate-700', 'tab-active');
        }

        // CORAN
        async function loadSurahs() {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            const select = document.getElementById('surahSelect');
            select.innerHTML = '<option value="">-- Choisir --</option>';
            data.data.forEach(s => select.innerHTML += `<option value="${s.number}">${s.number}. ${s.englishName}</option>`);
        }
        document.getElementById('surahSelect').addEventListener('change', async (e) => {
            const n = e.target.value; if(!n) return;
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${n}/fr.hamidullah`);
            const data = await res.json();
            let h = `<div class="text-center mb-6"><h2 class="text-2xl font-bold text-emerald-400">${data.data.englishName}</h2><div class="arabic text-4xl my-4 py-4 border-y border-slate-700">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div></div>`;
            data.data.ayahs.forEach(a => h += `<div class="bg-slate-800/40 p-4 rounded-xl border border-slate-700 text-lg mb-2">${a.text} <span class="text-emerald-500 text-sm font-bold">(${a.numberInSurah})</span></div>`);
            document.getElementById('coranContent').innerHTML = h;
        });

        // QUIZ (30 Questions)
        const db = [
            {q:"Combien de sourates dans le Coran ?", a:["110","114","120","112"], c:1},
            {q:"Le premier pilier de l'Islam ?", a:["Prière","Zakat","Shahada","Hajj"], c:2},
            {q:"Le mois du jeûne ?", a:["Muharram","Ramadan","Safar","Rajab"], c:1},
            {q:"La plus longue sourate ?", a:["Fatiha","Baqarah","Yasin","An-Nas"], c:1},
            {q:"Lieu de naissance du Prophète (SWS) ?", a:["Médine","La Mecque","Damas","Taïf"], c:1},
            {q:"L'ange de la révélation ?", a:["Mikaïl","Israfil","Jibril","Malik"], c:2},
            {q:"Nombre de prières obligatoires ?", a:["3","4","5","6"], c:2},
            {q:"Le livre révélé à Moussa ?", a:["Coran","Zabur","Injil","Tawrat"], c:3},
            {q:"Direction de la prière ?", a:["Qibla","Minbar","Mihrab","Kaaba"], c:0},
            {q:"Dernier Prophète de l'Islam ?", a:["Ibrahim","Issa","Moussa","Muhammad (SWS)"], c:3},
            {q:"Première sourate du Coran ?", a:["Baqarah","Yasin","Al-Fatiha","Al-Mulk"], c:2},
            {q:"Quelle est la langue du Coran ?", a:["Persan","Arabe","Turc","Urdu"], c:1},
            {q:"Jour sacré pour les musulmans ?", a:["Lundi","Samedi","Vendredi","Dimanche"], c:2},
            {q:"Nom du repas de rupture du jeûne ?", a:["Suhoor","Iftar","Fajr","Zakat"], c:1},
            {q:"L'un des fils d'Ibrahim (AS) ?", a:["Yusuf","Ismaïl","Idris","Yahya"], c:1},
            {q:"Combien de fois tourne-t-on autour de la Kaaba ?", a:["5","9","7","3"], c:2},
            {q:"La sourate surnommée le Cœur du Coran ?", a:["Al-Ikhlas","Yasin","Ar-Rahman","Al-Kahf"], c:1},
            {q:"Qui a construit la Kaaba avec Ibrahim ?", a:["Lut","Ismaïl","Ishaq","Yacoub"], c:1},
            {q:"Le nom de la montagne de la révélation ?", a:["Uhud","Safa","Hira","Arafat"], c:2},
            {q:"Quelle sourate n'a pas de Bismillah ?", a:["Yasin","At-Tawbah","An-Nasr","Al-Fil"], c:1}
        ];

        let questions = []; let cur = 0; let score = 0; let userAns = [];

        function startNewQuiz() {
            questions = [...db].sort(() => 0.5 - Math.random()).slice(0, 5);
            cur = 0; score = 0; userAns = [];
            document.getElementById('result-box').classList.add('hidden');
            document.getElementById('question-box').classList.remove('hidden');
            renderQ();
        }

        function renderQ() {
            const q = questions[cur];
            document.getElementById('progress-text').textContent = `Question ${cur+1}/5`;
            document.getElementById('question-text').textContent = q.q;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            q.a.forEach((opt, i) => {
                const b = document.createElement('button');
                b.className = "w-full p-4 bg-slate-700 hover:bg-slate-600 rounded-xl text-left border-2 border-transparent transition-all";
                b.textContent = opt;
                b.onclick = () => { userAns.push(i); if(i===q.c) score++; cur++; if(cur<5) renderQ(); else showEnd(); };
                container.appendChild(b);
            });
        }

        function showEnd() {
            document.getElementById('question-box').classList.add('hidden');
            document.getElementById('result-box').classList.remove('hidden');
            document.getElementById('final-score').textContent = `${score}/5`;
            const list = document.getElementById('correction-list');
            list.innerHTML = '<h3 class="font-bold text-emerald-400 mb-2">Correction :</h3>';
            questions.forEach((q, i) => {
                const ok = userAns[i] === q.c;
                list.innerHTML += `<div class="p-3 rounded-lg border ${ok?'border-emerald-500/50 bg-emerald-500/5':'border-red-500/50 bg-red-500/5'} mb-2">
                    <p class="font-semibold">${q.q}</p>
                    <p class="text-sm">Rép: <span class="${ok?'text-emerald-400':'text-red-400'}">${q.a[userAns[i]]}</span> ${!ok ? ' | Vrai: <span class="text-emerald-400">'+q.a[q.c]+'</span>' : ''}</p>
                </div>`;
            });
        }

        loadSurahs(); startNewQuiz();
    </script>
</body>
</html>
