<div id="s-home" class="space-y-4">
            <div class="card border-t-4 border-emerald-600">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-[10px] font-bold uppercase text-emerald-500 italic">Mosquée des Louanges (Montfermeil)</h3>
                    <span id="live-day" class="text-[8px] text-slate-500 uppercase font-bold"></span>
                </div>
                <div class="grid grid-cols-5 gap-2 text-center" id="prayer-times">
                    <p class="col-span-5 text-[10px] animate-pulse">Calcul des horaires en cours...</p>
                </div>
                <p class="text-[7px] text-center text-slate-500 mt-3 uppercase italic">Les horaires se mettent à jour automatiquement chaque jour</p>
            </div>

            <div class="card text-center bg-slate-900/50">
                <p class="text-[10px] font-bold uppercase text-slate-500 mb-4 tracking-widest">Compteur Tasbih</p>
                <div class="text-5xl font-black text-emerald-500 mb-6" id="tasbih-count">0</div>
                <div class="flex gap-2">
                    <button onclick="countTasbih()" class="flex-1 bg-emerald-600 py-6 rounded-3xl font-black text-lg active:scale-95 transition-transform shadow-lg shadow-emerald-600/20">+1</button>
                    <button onclick="resetTasbih()" class="px-6 bg-slate-800 rounded-3xl text-xs uppercase font-bold">Reset</button>
                </div>
            </div>
        </div>

    <script>
        // CETTE FONCTION CALCULE LES HORAIRES SELON LE JOUR ACTUEL
        async function updatePrayers() {
            try {
                // Coordonnées de Montfermeil / Méthode 3 (Mosquée de Paris)
                const r = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=Montfermeil&country=France&method=3`);
                const d = await r.json();
                const t = d.data.timings;
                
                document.getElementById('prayer-times').innerHTML = `
                    <div class="bg-slate-900 p-2 rounded-lg border border-white/5"><p class="text-[7px] text-slate-500 uppercase">Fajr</p><p class="text-[10px] font-bold text-emerald-400">${t.Fajr}</p></div>
                    <div class="bg-slate-900 p-2 rounded-lg border border-white/5"><p class="text-[7px] text-slate-500 uppercase">Duhr</p><p class="text-[10px] font-bold">${t.Dhuhr}</p></div>
                    <div class="bg-slate-900 p-2 rounded-lg border border-white/5"><p class="text-[7px] text-slate-500 uppercase">Asr</p><p class="text-[10px] font-bold">${t.Asr}</p></div>
                    <div class="bg-slate-900 p-2 rounded-lg border border-white/5"><p class="text-[7px] text-slate-500 uppercase">Maghr.</p><p class="text-[10px] font-bold text-emerald-400">${t.Maghrib}</p></div>
                    <div class="bg-slate-900 p-2 rounded-lg border border-white/5"><p class="text-[7px] text-slate-500 uppercase">Icha</p><p class="text-[10px] font-bold">${t.Isha}</p></div>
                `;
                
                document.getElementById('live-day').textContent = d.data.date.readable;
                document.getElementById('hijri-date').textContent = d.data.date.hijri.day + " " + d.data.date.hijri.month.fr + " " + d.data.date.hijri.year;
            } catch (e) {
                console.log("Erreur de mise à jour");
            }
        }

        // Lancer la mise à jour au démarrage
        function initApp() {
            updatePrayers();
            loadCoran();
        }
        
        // ... (Garder le reste des fonctions Tasbih, Coran, Quiz, VIP du message précédent)
    </script>
