<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muslim App - Complet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #010606; color: #e6edf3; padding-bottom: 110px; }
        .hidden { display: none; }
        .nav-active { background: #059669; color: white; border-bottom: 3px solid #34d399; }
        .card { background: #0a1212; border-radius: 20px; padding: 20px; border: 1px solid #1e293b; margin-bottom: 15px; }
    </style>
</head>
<body class="p-4" onload="initApp()">

    <div class="max-w-md mx-auto">
        <div class="text-center py-6">
            <h1 class="text-4xl font-black text-emerald-500 italic uppercase tracking-tighter">Muslim App</h1>
            <p id="hijri-date" class="text-[10px] text-emerald-700 font-bold uppercase mt-1">Chargement...</p>
        </div>

        <nav class="grid grid-cols-4 gap-1 mb-6 bg-slate-900/50 p-1 rounded-2xl sticky top-2 z-50">
            <button id="b-home" onclick="nav('home')" class="py-3 rounded-xl text-[8px] font-bold nav-active uppercase">Accueil</button>
            <button id="b-piliers" onclick="nav('piliers')" class="py-3 rounded-xl text-[8px] font-bold uppercase">Piliers</button>
            <button id="b-coran" onclick="nav('coran')" class="py-3 rounded-xl text-[8px] font-bold uppercase">Coran</button>
            <button id="b-outils" onclick="nav('outils')" class="py-3 rounded-xl text-[8px] font-bold uppercase">Outils</button>
        </nav>

        <div id="s-home" class="space-y-4">
            <div class="card border-t-4 border-emerald-600">
                <div class="flex justify-between items-center mb-4 text-[10px] font-bold uppercase text-emerald-500">
                    <span>Montfermeil</span>
                    <span id="live-day" class="text-slate-500"></span>
                </div>
                <div class="grid grid-cols-5 gap-2 text-center" id="prayer-times"></div>
            </div>
            <div class="card text-center">
                <p class="text-[10px] font-bold text-slate-500 mb-4 uppercase">Tasbih</p>
                <div class="text-5xl font-black text-emerald-500 mb-6" id="tasbih-count">0</div>
                <button onclick="countTasbih()" class="w-full bg-emerald-600 py-6 rounded-3xl font-black text-lg">+1</button>
            </div>
        </div>

        <div id="s-piliers" class="hidden space-y-3">
            <h2 class="text-center text-amber-500 font-black text-xs uppercase mb-4">Les 5 Piliers de l'Islam</h2>
            <div class="card border-l-4 border-amber-500 py-4"><p class="font-bold text-[10px] uppercase">1. La Chahada (Attestation de foi)</p></div>
            <div class="card border-l-4 border-amber-500 py-4"><p class="font-bold text-[10px] uppercase">2. La Salat (Prière quotidienne)</p></div>
            <div class="card border-l-4 border-amber-500 py-4"><p class="font-bold text-[10px] uppercase">3. La Zakat (Aumône légale)</p></div>
            <div class="card border-l-4 border-amber-500 py-4"><p class="font-bold text-[10px] uppercase">4. Le Sawm (Jeûne du Ramadan)</p></div>
            <div class="card border-l-4 border-amber-500 py-4"><p class="font-bold text-[10px] uppercase">5. Le Hajj (Pèlerinage à la Mecque)</p></div>
        </div>

        <div id="s-coran" class="hidden space-y-4">
            <select id="selSurah" class="w-full p-4 bg-slate-900 border border-emerald-900 rounded-xl text-emerald-400 font-bold text-xs"></select>
            <div id="contentCoran" class="mt-4"></div>
        </div>

        <div id="s-outils" class="hidden space-y-4">
            <button onclick="nav('vip')" class="w-full card border-l-4 border-amber-500 flex justify-between items-center py-6 bg-amber-500/5">
                <span class="font-bold uppercase text-[10px] text-amber-500">⭐ Pack VIP (Guide & Histoire)</span>
                <span>🔒</span>
            </button>
        </div>

        <div id="s-vip" class="hidden">
            <div id="vip-lock-screen" class="card text-center p-8 border-2 border-dashed border-amber-900/50">
                <div class="text-6xl mb-4">🔒</div>
                <h2 class="text-xl font-black text-amber-500 mb-2 uppercase">Zone VIP</h2>
                <div class="bg-black p-6 rounded-3xl mb-4 border border-white/5">
                    <p class="text-3xl font-black mb-6">2,99€</p>
                    <button onclick="window.open('https://www.paypal.me/YaminDjaouat881/2.99','_blank'); localStorage.setItem('paid','true')" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl text-[10px] uppercase">Payer via PayPal</button>
                </div>
                <button onclick="checkAccess()" class="text-amber-500 font-bold text-[10px] underline uppercase">Vérifier mon achat pour débloquer</button>
            </div>

            <div id="vip-unlocked-content" class="hidden space-y-6"></div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full bg-white text-black py-3 text-center font-black text-[9px] border-t-4 border-emerald-600 z-50 uppercase">
        Boutique : <span class="text-blue-600">Coran Noble Édition</span>
    </div>

    <script>
        const VIP_DATA = `
            <div class="card border-t-2 border-amber-500 px-0 overflow-hidden">
                <h3 class="px-4 text-amber-500 font-black text-[10px] uppercase mb-4 italic italic">Tableau : Les Ablutions</h3>
                <div class="grid grid-cols-2 text-[10px] bg-white/5 font-bold uppercase p-3 border-b border-white/10">
                    <div>Étape</div><div>Action</div>
                </div>
                <div class="grid grid-cols-2 text-[10px] p-3 border-b border-white/5">
                    <div class="text-slate-500 font-bold">01. Intention</div><div class="italic">Dire "Bismillah"</div>
                </div>
                <div class="grid grid-cols-2 text-[10px] p-3 border-b border-white/5 bg-white/5">
                    <div class="text-slate-500 font-bold">02. Visage</div><div class="italic">Laver 3 fois</div>
                </div>
                <div class="grid grid-cols-2 text-[10px] p-3 border-b border-white/5">
                    <div class="text-slate-500 font-bold">03. Bras</div><div class="italic">Jusqu'aux coudes (3x)</div>
                </div>
            </div>

            <div class="card border-t-2 border-emerald-500 px-0 overflow-hidden">
                <h3 class="px-4 text-emerald-500 font-black text-[10px] uppercase mb-4 italic">Tableau : Histoire du Coran</h3>
                <div class="grid grid-cols-2 text-[10px] bg-white/5 font-bold uppercase p-3 border-b border-white/10">
                    <div>Époque</div><div>Fait Marquant</div>
                </div>
                <div class="grid grid-cols-2 text-[10px] p-3 border-b border-white/5">
                    <div class="text-slate-500 font-bold">610 ap. J-C</div><div class="italic">Début de la révélation</div>
                </div>
                <div class="grid grid-cols-2 text-[10px] p-3 border-b border-white/5 bg-white/5">
                    <div class="text-slate-500 font-bold">Abou Bakr</div><div class="italic">Premier recueil écrit</div>
                </div>
            </div>
        `;

        function nav(id) {
            ['home','piliers','coran','outils','vip'].forEach(s => {
                document.getElementById('s-'+s)?.classList.add('hidden');
                document.getElementById('b-'+s)?.classList.remove('nav-active');
            });
            document.getElementById('s-'+id).classList.remove('hidden');
            document.getElementById('b-'+id)?.classList.add('nav-active');
            if(id === 'vip') checkAccess();
        }

        function checkAccess() {
            if(localStorage.getItem('paid') === 'true') {
                document.getElementById('vip-lock-screen').classList.add('hidden');
                const content = document.getElementById('vip-unlocked-content');
                content.innerHTML = VIP_DATA;
                content.classList.remove('hidden');
            }
        }

        async function initApp() {
            try {
                const r = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Montfermeil&country=France&method=3');
                const d = await r.json();
                const t = d.data.timings;
                document.getElementById('prayer-times').innerHTML = `
                    <div class="bg-slate-900 p-2 rounded-lg border border-white/5"><p class="text-[7px] text-slate-500">FAJR</p><p class="text-[9px] font-bold text-emerald-400">${t.Fajr}</p></div>
                    <div class="bg-slate-900 p-2 rounded-lg border border-white/5"><p class="text-[7px] text-slate-500">DUHR</p><p class="text-[9px] font-bold">${t.Dhuhr}</p></div>
                    <div class="bg-slate-900 p-2 rounded-lg border border-white/5"><p class="text-[7px] text-slate-500">ASR</p><p class="text-[9px] font-bold">${t.Asr}</p></div>
                    <div class="bg-slate-900 p-2 rounded-lg border border-white/5"><p class="text-[7px] text-slate-500">MAGH.</p><p class="text-[9px] font-bold text-emerald-400">${t.Maghrib}</p></div>
                    <div class="bg-slate-900 p-2 rounded-lg border border-white/5"><p class="text-[7px] text-slate-500">ICHA</p><p class="text-[9px] font-bold">${t.Isha}</p></div>
                `;
                document.getElementById('live-day').textContent = d.data.date.readable;
                document.getElementById('hijri-date').textContent = d.data.date.hijri.day + " " + d.data.date.hijri.month.fr;
            } catch(e) {}
            loadCoran();
            if(localStorage.getItem('paid') === 'true') checkAccess();
        }

        async function loadCoran() {
            const r = await fetch('https://api.alquran.cloud/v1/surah');
            const d = await r.json();
            const sel = document.getElementById('selSurah');
            sel.innerHTML = '<option value="">-- CHOISIR SOURATE --</option>';
            d.data.forEach(s => sel.innerHTML += `<option value="${s.number}">${s.number}. ${s.englishName}</option>`);
        }

        document.getElementById('selSurah').addEventListener('change', async (e) => {
            if(!e.target.value) return;
            const r = await fetch(`https://api.alquran.cloud/v1/surah/${e.target.value}/fr.hamidullah`);
            const d = await r.json();
            let h = '';
            d.data.ayahs.forEach(a => h += `<div class="p-4 bg-slate-900/60 rounded-xl mb-2 border border-white/5 text-[11px]">${a.text}</div>`);
            document.getElementById('contentCoran').innerHTML = h;
        });

        let count = 0;
        function countTasbih() { count++; document.getElementById('tasbih-count').textContent = count; }
    </script>
</body>
</html>
