<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apprendre le Coran - FlashCam Pro Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri&family=Inter:wght@400;700&display=swap');
        .arabic-text { font-family: 'Amiri', serif; font-size: 1.5rem; }
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
    </style>
</head>
<body class="p-4">

    <header class="text-center mb-8">
        <h1 class="text-3xl font-bold text-emerald-400">Le Saint Coran</h1>
        <p class="text-slate-400">Apprentissage et Lecture</p>
    </header>

    <div class="max-w-md mx-auto mb-6">
        <input type="text" id="search" placeholder="Rechercher une sourate..." 
               class="w-full p-3 rounded-lg bg-slate-800 border border-slate-700 focus:outline-none focus:border-emerald-500">
    </div>

    <div id="surah-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <p class="text-center col-span-full">Chargement des sourates...</p>
    </div>

    <div id="modal" class="fixed inset-0 bg-black bg-opacity-90 hidden overflow-y-auto p-4">
        <div class="max-w-2xl mx-auto bg-slate-900 rounded-xl p-6 mt-10">
            <button onclick="closeSurah()" class="mb-4 text-emerald-400 font-bold uppercase text-sm">← Retour</button>
            <div id="surah-content" class="text-right"></div>
        </div>
    </div>

    <script>
        const surahListContainer = document.getElementById('surah-list');
        const searchInput = document.getElementById('search');
        let allSurahs = [];

        // 1. Récupérer la liste des sourates
        async function fetchSurahs() {
            try {
                const response = await fetch('https://api.alquran.cloud/v1/surah');
                const data = await response.json();
                allSurahs = data.data;
                displaySurahs(allSurahs);
            } catch (error) {
                surahListContainer.innerHTML = "Erreur de chargement.";
            }
        }

        // 2. Afficher les sourates
        function displaySurahs(surahs) {
            surahListContainer.innerHTML = surahs.map(s => `
                <div onclick="loadSurah(${s.number})" class="p-4 bg-slate-800 rounded-lg hover:bg-slate-700 cursor-pointer transition border border-slate-700">
                    <div class="flex justify-between items-center">
                        <span class="text-emerald-500 font-bold">#${s.number}</span>
                        <span class="arabic-text">${s.name}</span>
                    </div>
                    <h3 class="text-lg font-semibold">${s.englishName}</h3>
                    <p class="text-sm text-slate-400">${s.englishNameTranslation} | ${s.numberOfAyahs} versets</p>
                </div>
            `).join('');
        }

        // 3. Charger le contenu d'une sourate (Arabe + Français)
        async function loadSurah(id) {
            const content = document.getElementById('surah-content');
            content.innerHTML = "Chargement du texte...";
            document.getElementById('modal').classList.remove('hidden');

            const res = await fetch(`https://api.alquran.cloud/v1/surah/${id}/editions/quran-uthmani,fr.hamidullah`);
            const data = await res.json();
            
            const arabic = data.data.ayahs;
            const french = data.data.ayahs;

            let html = `<h2 class="text-2xl text-emerald-400 mb-6 text-center">${data.data.name}</h2>`;
            
            arabic.forEach((ayah, index) => {
                html += `
                    <div class="mb-8 border-b border-slate-800 pb-4">
                        <p class="arabic-text leading-loose mb-2">${ayah.text}</p>
                        <p class="text-left text-slate-400 italic text-sm">${french[index].text}</p>
                    </div>
                `;
            });
            content.innerHTML = html;
        }

        function closeSurah() {
            document.getElementById('modal').classList.add('hidden');
        }

        // Recherche
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = allSurahs.filter(s => 
                s.englishName.toLowerCase().includes(val) || 
                s.number.toString() === val
            );
            displaySurahs(filtered);
        });

        fetchSurahs();
    </script>
</body>
</html>
