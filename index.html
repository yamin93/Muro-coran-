<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muslim App Ultra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #010606; color: #e6edf3; padding-bottom: 110px; }
        .hidden { display: none; }
        .nav-active { background: #059669; color: white; border-bottom: 3px solid #34d399; }
        .card { background: #0a1212; border-radius: 20px; padding: 20px; border: 1px solid #1e293b; margin-bottom: 15px; }
        .vip-locked-bg { background: linear-gradient(rgba(10,18,18,0.9), rgba(10,18,18,0.9)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png'); }
    </style>
</head>
<body class="p-4" onload="initApp()">

        </div>

            <button id="b-home" onclick="nav('home')" class="py-3 rounded-xl text-[8px] font-bold nav-active uppercase">Accueil</button>
            <button id="b-piliers" onclick="nav('piliers')" class="py-3 rounded-xl text-[8px] font-bold uppercase">Piliers</button>
            <button id="b-coran" onclick="nav('coran')" class="py-3 rounded-xl text-[8px] font-bold uppercase">Coran</button>
            <button id="b-outils" onclick="nav('outils')" class="py-3 rounded-xl text-[8px] font-bold uppercase">Outils</button>
        </nav>

            <div class="card border-t-4 border-emerald-600">
                <div class="flex justify-between items-center mb-4 text-[10px] font-bold uppercase text-emerald-500">
                    <span>Mosquée Montfermeil</span>
                    <span id="live-day" class="text-slate-500"></span>
                </div>
                <div class="grid grid-cols-5 gap-2 text-center" id="prayer-times"></div>
            </div>
            <div class="card text-center bg-slate-900/50">
                <p class="text-[10px] font-bold uppercase text-slate-500 mb-4">Tasbih</p>
                <div class="text-5xl font-black text-emerald-500 mb-6" id="tasbih-count">0</div>
                <button onclick="countTasbih()" class="w-full bg-emerald-600 py-6 rounded-3xl font-black text-lg active:scale-95 transition-transform">+1</button>
            </div>
        </div>

        <div id="s-piliers" class="hidden space-y-3">
            <div class="card border-l-4 border-amber-500 py-4 font-bold text-xs">1. CHAHADA</div>
            <div class="card border-l-4 border-amber-500 py-4 font-bold text-xs">2. SALAT</div>
            <div class="card border-l-4 border-amber-500 py-4 font-bold text-xs">3. ZAKAT</div>
            <div class="card border-l-4 border-amber-500 py-4 font-bold text-xs">4. SAWM</div>
            <div class="card border-l-4 border-amber-500 py-4 font-bold text-xs">5. HAJJ</div>
        </div>

            <select id="selSurah" class="w-full p-4 bg-slate-900 border border-emerald-900 rounded-xl text-emerald-400 font-bold text-xs"></select>
            <div id="contentCoran" class="mt-4 text-left"></div>
        </div>
